<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Compiler — AI Text Eraser Suite</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #151b2c;
            --border-color: #242f49;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background-color: rgba(21, 27, 44, 0.5);
            cursor: pointer;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .dropzone input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-img {
            max-width: 100%;
            border-radius: 4px;
            display: none;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .canvas-container {
            max-width: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            border-radius: 4px;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
</head>
<body>

<div class="container">
    <h1>🚀 Sunday Compiler (AI Edition)</h1>
    <p class="subtitle">Automated Intelligent Text Editing Suite</p>

    <div class="workspace-grid">
        <!-- LEFT: INPUT PANEL -->
        <div class="panel">
            <div class="dropzone">
                <p id="upload-prompt">Drag & Drop English Webtoon Panel or Click to Browse</p>
                <input type="file" id="file-input" accept="image/*">
                <img id="source-preview" class="preview-img" alt="Source Preview">
            </div>
            <button class="btn" id="compile-btn" onclick="executeAIErase()">🧼 Compile & Clean with AI</button>
        </div>

        <!-- RIGHT: OUTPUT PANEL -->
        <div class="panel">
            <h3>AI Restored Production Output</h3>
            <div class="dropzone" style="cursor: default; border-style: solid;">
                <p id="status-placeholder" style="color: #64748b;">Awaiting processing canvas execution...</p>
                <div class="canvas-container">
                    <canvas id="production-canvas" style="display:none;"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenAI } from '@google/genai';

    let loadedImageBase64 = null;
    let loadedImageRaw = null;

    const fileInput = document.getElementById('file-input');
    const sourcePreview = document.getElementById('source-preview');
    const uploadPrompt = document.getElementById('upload-prompt');

    // 🔑 HARDCODED API KEY STRATEGY
    const part1 = "AIzaSy"; 
    const part2 = "AQ.Ab8RN6KjfuF6-bo_VAhdMIM8gsvuzZ-HDqFcOPNVLIXiqP2PkQ";
    const apiKey = part1 + part2;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                sourcePreview.src = event.target.result;
                sourcePreview.style.display = 'block';
                uploadPrompt.style.display = 'none';
                
                loadedImageBase64 = event.target.result.split(',')[1];
                
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    loadedImageRaw = img;
                }
            }
            reader.readAsDataURL(file);
        }
    });

    window.executeAIErase = async function() {
        if (part2 === "YOUR_KEY_REST_HERE") {
            alert("Please modify the code first to insert your real API key characters into the 'part2' variable!");
            return;
        }
        if (!loadedImageBase64) {
            alert("Please upload a webtoon panel first!");
            return;
        }

        const btn = document.getElementById('compile-btn');
        const statusText = document.getElementById('status-placeholder');
        const canvas = document.getElementById('production-canvas');
        const ctx = canvas.getContext('2d');

        btn.disabled = true;
        btn.innerText = "⏳ AI is Redrawing Backgrounds...";
        statusText.innerText = "Processing canvas metrics and analyzing layout artwork with Gemini...";
        canvas.style.display = 'none';
        statusText.style.display = 'block';

        try {
            const ai = new GoogleGenAI({ apiKey: apiKey });
            
            const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: [
                    {
                        inlineData: {
                            mimeType: "image/jpeg",
                            data: loadedImageBase64
                        }
                    },
                    "Analyze this comic panel carefully. Identify all text inside speech bubbles or text boxes. Remove the text strings completely and redraw/repaint the background colors and art structures seamlessly so that it looks clean, blank, and completely ready for custom typesetting translation. Return ONLY the final clean compiled image asset back in standard binary data."
                ],
            });

            canvas.width = loadedImageRaw.width;
            canvas.height = loadedImageRaw.height;
            ctx.drawImage(loadedImageRaw, 0, 0);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) {
                    continue; 
                }
            }
            
            statusText.style.display = 'none';
            canvas.style.display = 'block';

        } catch (error) {
            console.error(error);
            alert("API Processing Encountered an Error: " + error.message);
            statusText.innerText = "Execution failed.";
        } finally {
            btn.disabled = false;
            btn.innerText = "🧼 Compile & Clean with AI";
        }
    }
</script>

</body>
</html>
