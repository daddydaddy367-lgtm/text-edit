<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday Compiler — Auto Text Eraser</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #151b2c;
            --border-color: #242f49;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dropzone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background-color: rgba(21, 27, 44, 0.5);
            cursor: pointer;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .dropzone input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-img {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            display: none;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .canvas-container {
            max-width: 100%;
            max-height: 500px;
            overflow: auto;
            display: flex;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Sunday Compiler</h1>
    <p class="subtitle">Automated Text Editing Web Suite — Instant Browser Execution</p>

    <div class="workspace-grid">
        <!-- LEFT: INPUT PANEL -->
        <div class="panel">
            <div class="dropzone">
                <p id="upload-prompt">Drag & Drop English Webtoon Panel or Click to Browse</p>
                <input type="file" id="file-input" accept="image/*">
                <img id="source-preview" class="preview-img" alt="Source Preview">
            </div>
            <button class="btn" onclick="executeAutoErase()">🧼 Compile & Erase Text</button>
        </div>

        <!-- RIGHT: OUTPUT PANEL -->
        <div class="panel">
            <h3>Cleaned Production Output</h3>
            <div class="dropzone" style="cursor: default; border-style: solid;">
                <p id="output-placeholder" style="color: #64748b;">Awaiting processing canvas execution...</p>
                <div class="canvas-container">
                    <canvas id="production-canvas" style="display:none;"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let loadedImage = null;

    const fileInput = document.getElementById('file-input');
    const sourcePreview = document.getElementById('source-preview');
    const uploadPrompt = document.getElementById('upload-prompt');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                sourcePreview.src = event.target.result;
                sourcePreview.style.display = 'block';
                uploadPrompt.style.display = 'none';
                
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    loadedImage = img;
                }
            }
            reader.readAsDataURL(file);
        }
    });

    function executeAutoErase() {
        if (!loadedImage) {
            alert("Please upload a webtoon image first!");
            return;
        }

        const canvas = document.getElementById('production-canvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('output-placeholder');

        canvas.width = loadedImage.width;
        canvas.height = loadedImage.height;
        ctx.drawImage(loadedImage, 0, 0);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        // Auto-erase background matching text colors
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];

            // Scan for dark font text strokes inside bright areas
            if (r < 75 && g < 75 && b < 75) {
                data[i] = 255;   
                data[i+1] = 255;
                data[i+2] = 255;
            }
        }

        ctx.putImageData(imgData, 0, 0);
        placeholder.style.display = 'none';
        canvas.style.display = 'block';
    }
</script>

</body>
</html>
